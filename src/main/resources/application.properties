spring.application.name=mdrrmo-system

#database configuration
# Database configuration (Railway will override these)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mdrrmo_system}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:springstudent}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:springstudent}

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=300000

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none

# change path of swagger
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
spring.main.lazy-initialization=true

server.tomcat.threads.max=20
server.tomcat.threads.min-spare=5

