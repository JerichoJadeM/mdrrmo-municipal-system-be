spring.application.name=mdrrmo-system

#database configuration
# Database configuration (Railway will override these)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mdrrmo_system}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:springstudent}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:springstudent}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# change path of swagger
springdoc.swagger-ui.path=/docs

